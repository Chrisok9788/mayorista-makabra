<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111111" />
  <title>Centro de Sincronización | Makabra</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f7f7f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top right, rgba(215, 32, 39, .18), transparent 32rem), #0a0a0a;
    }

    button { font: inherit; }

    .shell {
      width: min(1160px, calc(100% - 24px));
      margin: 0 auto;
      padding: 26px 0 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
    }

    .eyebrow {
      margin: 0 0 7px;
      color: #f0c419;
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    h1 { margin: 0; font-size: clamp(1.7rem, 5vw, 2.65rem); line-height: 1.05; }
    .subtitle { margin: 9px 0 0; color: #a8a8a8; line-height: 1.5; }

    .buttons { display: flex; gap: 9px; flex-wrap: wrap; justify-content: flex-end; }

    .button {
      border: 1px solid #343434;
      border-radius: 13px;
      background: #171717;
      color: white;
      padding: 11px 14px;
      font-weight: 750;
      cursor: pointer;
    }

    .button.primary { border-color: #a21b20; background: #c51f26; }
    .button:disabled { opacity: .55; cursor: wait; }

    .banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 17px;
      border: 1px solid #2d2d2d;
      border-radius: 18px;
      background: rgba(22, 22, 22, .94);
      margin-bottom: 16px;
    }

    .banner strong { display: block; font-size: 1.08rem; }
    .banner small { color: #999; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .ok { color: #52d273; background: rgba(82,210,115,.1); }
    .warn { color: #f0c419; background: rgba(240,196,25,.1); }
    .bad { color: #ff6868; background: rgba(255,104,104,.1); }
    .neutral { color: #bcbcbc; background: rgba(188,188,188,.1); }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 15px;
    }

    .card {
      grid-column: span 3;
      min-width: 0;
      padding: 18px;
      border: 1px solid #292929;
      border-radius: 18px;
      background: rgba(18,18,18,.95);
    }

    .card.wide { grid-column: span 6; }
    .card.full { grid-column: 1 / -1; }

    .card-head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; margin-bottom: 16px; }
    .card h2 { margin: 0; font-size: 1rem; }
    .metric { font-size: clamp(1.8rem, 5vw, 2.55rem); font-weight: 850; letter-spacing: -.03em; }
    .label { color: #999; margin-top: 4px; }

    .details { display: grid; gap: 10px; margin: 0; }
    .row { display: flex; justify-content: space-between; gap: 16px; padding-bottom: 10px; border-bottom: 1px solid #292929; }
    .row:last-child { border-bottom: 0; padding-bottom: 0; }
    .row dt { color: #999; }
    .row dd { margin: 0; text-align: right; font-weight: 700; overflow-wrap: anywhere; }

    .result {
      margin-top: 16px;
      padding: 15px;
      border: 1px solid #303030;
      border-radius: 15px;
      background: #141414;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: #c9c9c9;
      display: none;
    }

    .result.show { display: block; }
    .result.error { border-color: rgba(255,104,104,.4); color: #ff9a9a; }
    .loading { min-height: 260px; display: grid; place-items: center; color: #aaa; }

    .notice { margin: 17px 0 0; color: #8f8f8f; text-align: center; font-size: .85rem; line-height: 1.5; }

    @media (max-width: 860px) {
      .card { grid-column: span 6; }
      .card.wide { grid-column: 1 / -1; }
    }

    @media (max-width: 600px) {
      .shell { width: min(100% - 18px, 1160px); padding-top: 17px; }
      .topbar { flex-direction: column; }
      .buttons { width: 100%; justify-content: stretch; }
      .button { flex: 1; }
      .banner { align-items: flex-start; flex-direction: column; }
      .card, .card.wide, .card.full { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Mayorista Makabra</p>
        <h1>Centro de Sincronización</h1>
        <p class="subtitle">Google Sheets alimenta productos y clientes; Supabase funciona como base principal.</p>
      </div>
      <div class="buttons">
        <button class="button" id="refreshButton" type="button">Actualizar estado</button>
        <button class="button primary" id="syncButton" type="button">Sincronizar ahora</button>
      </div>
    </header>

    <section id="content" class="loading">Cargando estado…</section>
    <pre id="result" class="result"></pre>
    <p class="notice">La sincronización automática se programa cada 5 minutos mediante GitHub Actions. El token manual se conserva solo durante esta pestaña.</p>
  </main>

  <script type="module">
    const content = document.querySelector('#content');
    const refreshButton = document.querySelector('#refreshButton');
    const syncButton = document.querySelector('#syncButton');
    const resultBox = document.querySelector('#result');

    const escapeHtml = (value) => String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');

    const formatDate = (value) => {
      if (!value) return 'Sin datos';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return new Intl.DateTimeFormat('es-UY', {
        dateStyle: 'short',
        timeStyle: 'medium',
        timeZone: 'America/Montevideo',
      }).format(date);
    };

    const statusClass = (value) => {
      const normalized = String(value || '').toLowerCase();
      if (['completada', 'conectado', 'sincronizado', 'correcto', 'operativa'].includes(normalized)) return 'ok';
      if (['error', 'desconectado'].includes(normalized)) return 'bad';
      if (['advertencia', 'simulado'].includes(normalized)) return 'warn';
      return 'neutral';
    };

    const pill = (label, value) => `<span class="pill ${statusClass(value)}">${escapeHtml(label)}</span>`;

    function render(data) {
      const sync = data.ultima_sincronizacion_google_sheets || {};
      const connections = data.conexiones || {};
      const supabase = connections.supabase || {};
      const sheets = connections.google_sheets || {};
      const automation = data.automatizacion || {};

      content.className = '';
      content.innerHTML = `
        <section class="banner">
          <div>
            <strong>Estado general del sistema</strong>
            <small>Actualizado ${escapeHtml(formatDate(data.generadoEn))}</small>
          </div>
          ${pill(data.estado_general || 'sin datos', data.estado_general)}
        </section>

        <section class="grid">
          <article class="card">
            <div class="card-head"><h2>Productos</h2>${pill(supabase.estado || 'sin datos', supabase.estado)}</div>
            <div class="metric">${escapeHtml(supabase.productos ?? '—')}</div>
            <div class="label">registros en Supabase</div>
          </article>

          <article class="card">
            <div class="card-head"><h2>Clientes</h2>${pill(supabase.estado || 'sin datos', supabase.estado)}</div>
            <div class="metric">${escapeHtml(supabase.clientes ?? '—')}</div>
            <div class="label">clientes activos</div>
          </article>

          <article class="card">
            <div class="card-head"><h2>Categorías</h2>${pill('calculadas', 'correcto')}</div>
            <div class="metric">${escapeHtml(supabase.categorias ?? '—')}</div>
            <div class="label">categorías de productos</div>
          </article>

          <article class="card">
            <div class="card-head"><h2>Subcategorías</h2>${pill('calculadas', 'correcto')}</div>
            <div class="metric">${escapeHtml(supabase.subcategorias ?? '—')}</div>
            <div class="label">combinaciones activas</div>
          </article>

          <article class="card wide">
            <div class="card-head"><h2>Última sincronización</h2>${pill(sync.estado || 'sin datos', sync.estado)}</div>
            <dl class="details">
              <div class="row"><dt>Origen</dt><dd>${escapeHtml(sync.origen || '—')}</dd></div>
              <div class="row"><dt>Inicio</dt><dd>${escapeHtml(formatDate(sync.inicio))}</dd></div>
              <div class="row"><dt>Fin</dt><dd>${escapeHtml(formatDate(sync.fin))}</dd></div>
              <div class="row"><dt>Duración</dt><dd>${escapeHtml(sync.duracion_segundos ?? '—')} segundos</dd></div>
              <div class="row"><dt>Actualizados</dt><dd>${escapeHtml(sync.registros_actualizados ?? '—')}</dd></div>
              <div class="row"><dt>Errores</dt><dd>${escapeHtml(sync.registros_con_error ?? '—')}</dd></div>
              <div class="row"><dt>Mensaje</dt><dd>${escapeHtml(sync.mensaje || 'Sin mensaje')}</dd></div>
            </dl>
          </article>

          <article class="card wide">
            <div class="card-head"><h2>Automatización</h2>${pill('activa', 'correcto')}</div>
            <dl class="details">
              <div class="row"><dt>Proveedor</dt><dd>${escapeHtml(automation.proveedor || 'GitHub Actions')}</dd></div>
              <div class="row"><dt>Frecuencia</dt><dd>Cada ${escapeHtml(automation.frecuencia_minutos || 5)} minutos</dd></div>
              <div class="row"><dt>Endpoint</dt><dd>${escapeHtml(automation.endpoint || '/api/sync-all')}</dd></div>
              <div class="row"><dt>Google Sheets</dt><dd>${escapeHtml(sheets.estado || 'sin datos')}</dd></div>
            </dl>
          </article>
        </section>
      `;
    }

    async function loadStatus() {
      refreshButton.disabled = true;
      refreshButton.textContent = 'Actualizando…';
      try {
        const response = await fetch(`/api/sync-status?t=${Date.now()}`, { cache: 'no-store' });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || data.error || `Error ${response.status}`);
        render(data);
      } catch (error) {
        content.className = '';
        content.innerHTML = `<div class="result show error"><strong>No se pudo cargar el estado.</strong><br>${escapeHtml(error.message || error)}</div>`;
      } finally {
        refreshButton.disabled = false;
        refreshButton.textContent = 'Actualizar estado';
      }
    }

    async function syncAll() {
      let token = sessionStorage.getItem('makabra_sync_token') || '';
      if (!token) token = window.prompt('Ingresá el SYNC_TOKEN para ejecutar la sincronización:') || '';
      token = token.trim();
      if (!token) return;

      sessionStorage.setItem('makabra_sync_token', token);
      syncButton.disabled = true;
      syncButton.textContent = 'Sincronizando…';
      resultBox.className = 'result show';
      resultBox.textContent = 'Sincronización en curso…';

      try {
        const response = await fetch('/api/sync-all', {
          method: 'POST',
          headers: { 'x-sync-token': token, Accept: 'application/json' },
          cache: 'no-store',
        });
        const data = await response.json();
        if (!response.ok) {
          if (response.status === 401) sessionStorage.removeItem('makabra_sync_token');
          throw new Error(data.message || data.error || `Error ${response.status}`);
        }

        resultBox.className = 'result show';
        resultBox.textContent = JSON.stringify(data, null, 2);
        await loadStatus();
      } catch (error) {
        resultBox.className = 'result show error';
        resultBox.textContent = String(error.message || error);
      } finally {
        syncButton.disabled = false;
        syncButton.textContent = 'Sincronizar ahora';
      }
    }

    refreshButton.addEventListener('click', loadStatus);
    syncButton.addEventListener('click', syncAll);
    loadStatus();
  </script>
</body>
</html>
