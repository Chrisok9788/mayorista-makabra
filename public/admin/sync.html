<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111111" />
  <title>Centro de Sincronización | Makabra</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f7f7f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(215, 32, 39, .18), transparent 30rem),
        #0a0a0a;
    }

    button, a { font: inherit; }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 7px;
      color: #f0c419;
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.65rem, 5vw, 2.65rem);
      line-height: 1.05;
    }

    .subtitle {
      margin: 9px 0 0;
      color: #a8a8a8;
      line-height: 1.5;
    }

    .refresh {
      border: 1px solid #343434;
      border-radius: 14px;
      background: #171717;
      color: white;
      padding: 12px 16px;
      font-weight: 750;
      cursor: pointer;
    }

    .refresh:disabled { opacity: .55; cursor: wait; }

    .banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border: 1px solid #2e2e2e;
      border-radius: 18px;
      background: rgba(22, 22, 22, .92);
      margin-bottom: 18px;
    }

    .banner strong { display: block; font-size: 1.08rem; }
    .banner small { color: #9e9e9e; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: .82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 12px currentColor;
    }

    .ok { color: #52d273; background: rgba(82, 210, 115, .1); }
    .warn { color: #f0c419; background: rgba(240, 196, 25, .1); }
    .bad { color: #ff6666; background: rgba(255, 102, 102, .1); }
    .neutral { color: #bcbcbc; background: rgba(188, 188, 188, .1); }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      grid-column: span 4;
      border: 1px solid #282828;
      border-radius: 18px;
      background: rgba(18, 18, 18, .94);
      padding: 19px;
      min-width: 0;
    }

    .card.wide { grid-column: span 8; }
    .card.full { grid-column: 1 / -1; }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }

    .card h2 {
      margin: 0;
      font-size: 1.04rem;
    }

    .muted { color: #989898; }

    .metric {
      font-size: clamp(1.7rem, 5vw, 2.5rem);
      font-weight: 850;
      letter-spacing: -.03em;
    }

    .metric-label { color: #9b9b9b; margin-top: 5px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 11px;
    }

    .stat {
      padding: 14px;
      border-radius: 14px;
      background: #202020;
    }

    .stat b { display: block; font-size: 1.35rem; }
    .stat span { color: #a3a3a3; font-size: .84rem; }

    .details {
      display: grid;
      gap: 11px;
      margin: 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding-bottom: 11px;
      border-bottom: 1px solid #292929;
    }

    .row:last-child { border-bottom: 0; padding-bottom: 0; }
    .row dt { color: #9d9d9d; }
    .row dd { margin: 0; text-align: right; font-weight: 700; overflow-wrap: anywhere; }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .action {
      display: block;
      padding: 13px 14px;
      text-align: center;
      text-decoration: none;
      color: white;
      border: 1px solid #353535;
      border-radius: 13px;
      background: #1c1c1c;
      font-weight: 750;
    }

    .action.primary {
      border-color: #9f171c;
      background: #c51f26;
    }

    .notice {
      margin-top: 18px;
      color: #929292;
      font-size: .86rem;
      line-height: 1.5;
      text-align: center;
    }

    .loading {
      min-height: 260px;
      display: grid;
      place-items: center;
      color: #a5a5a5;
    }

    .error-box {
      padding: 18px;
      border: 1px solid rgba(255, 102, 102, .35);
      border-radius: 15px;
      background: rgba(255, 102, 102, .08);
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      .card, .card.wide { grid-column: span 6; }
      .card.full { grid-column: 1 / -1; }
    }

    @media (max-width: 600px) {
      .shell { width: min(100% - 20px, 1180px); padding-top: 18px; }
      .topbar { align-items: flex-start; }
      .topbar .refresh { padding: 10px 12px; }
      .banner { align-items: flex-start; flex-direction: column; }
      .card, .card.wide, .card.full { grid-column: 1 / -1; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Mayorista Makabra</p>
        <h1>Centro de Sincronización</h1>
        <p class="subtitle">Estado de Google Sheets, Supabase, catálogo web y simulación Scanntech.</p>
      </div>
      <button class="refresh" id="refreshButton" type="button">Actualizar</button>
    </header>

    <section id="content" class="loading">Cargando estado…</section>
    <p class="notice">Panel informativo de solo lectura. Todavía no ejecuta sincronizaciones ni modifica productos.</p>
  </main>

  <script type="module">
    const content = document.querySelector('#content');
    const refreshButton = document.querySelector('#refreshButton');

    const escapeHtml = (value) => String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');

    const formatDate = (value) => {
      if (!value) return 'Sin datos';
      const date = new Date(value);
      return Number.isNaN(date.getTime())
        ? String(value)
        : new Intl.DateTimeFormat('es-UY', {
            dateStyle: 'short',
            timeStyle: 'medium',
            timeZone: 'America/Montevideo',
          }).format(date);
    };

    const statusClass = (value) => {
      const normalized = String(value || '').toLowerCase();
      if (['completada', 'conectado', 'sincronizado', 'correcto'].includes(normalized)) return 'ok';
      if (['error', 'desconectado'].includes(normalized)) return 'bad';
      if (['advertencia', 'simulado'].includes(normalized)) return 'warn';
      return 'neutral';
    };

    const pill = (label, value) => `<span class="pill ${statusClass(value)}">${escapeHtml(label)}</span>`;

    function render(data) {
      const sync = data.ultima_sincronizacion_google_sheets || {};
      const connections = data.conexiones || {};
      const changes = data.cambios_detectados || {};
      const supabase = connections.supabase || {};
      const sheets = connections.google_sheets || {};
      const scanntech = connections.scanntech || {};
      const web = connections.pagina_web || {};

      content.className = '';
      content.innerHTML = `
        <section class="banner">
          <div>
            <strong>Estado general del sistema</strong>
            <small>Actualizado ${escapeHtml(formatDate(data.generadoEn))}</small>
          </div>
          ${pill(data.estado_general || 'sin datos', data.estado_general)}
        </section>

        <section class="grid">
          <article class="card">
            <div class="card-head">
              <h2>Google Sheets</h2>
              ${pill(sheets.estado || 'sin datos', sheets.estado)}
            </div>
            <div class="metric">${escapeHtml(sync.registros_procesados ?? '—')}</div>
            <div class="metric-label">registros procesados</div>
          </article>

          <article class="card">
            <div class="card-head">
              <h2>Supabase</h2>
              ${pill(supabase.estado || 'sin datos', supabase.estado)}
            </div>
            <div class="metric">${escapeHtml(supabase.productos ?? '—')}</div>
            <div class="metric-label">productos disponibles</div>
          </article>

          <article class="card">
            <div class="card-head">
              <h2>Página web</h2>
              ${pill(web.estado || 'sin datos', web.estado)}
            </div>
            <div class="metric">${escapeHtml(web.fuente_catalogo || '—')}</div>
            <div class="metric-label">fuente actual del catálogo</div>
          </article>

          <article class="card wide">
            <div class="card-head">
              <h2>Última sincronización real</h2>
              ${pill(sync.estado || 'sin datos', sync.estado)}
            </div>
            <dl class="details">
              <div class="row"><dt>Inicio</dt><dd>${escapeHtml(formatDate(sync.inicio))}</dd></div>
              <div class="row"><dt>Fin</dt><dd>${escapeHtml(formatDate(sync.fin))}</dd></div>
              <div class="row"><dt>Duración</dt><dd>${escapeHtml(sync.duracion_segundos ?? '—')} segundos</dd></div>
              <div class="row"><dt>Actualizados</dt><dd>${escapeHtml(sync.registros_actualizados ?? '—')}</dd></div>
              <div class="row"><dt>Errores</dt><dd>${escapeHtml(sync.registros_con_error ?? '—')}</dd></div>
              <div class="row"><dt>Mensaje</dt><dd>${escapeHtml(sync.mensaje || 'Sin mensaje')}</dd></div>
            </dl>
          </article>

          <article class="card">
            <div class="card-head">
              <h2>Scanntech</h2>
              ${pill(scanntech.estado || 'sin datos', scanntech.estado)}
            </div>
            <div class="metric">${escapeHtml(scanntech.articulos ?? '—')}</div>
            <div class="metric-label">artículos del simulador</div>
          </article>

          <article class="card full">
            <div class="card-head">
              <div>
                <h2>Cambios detectados por el simulador</h2>
                <div class="muted">Comparación de prueba contra los productos actuales.</div>
              </div>
            </div>
            <div class="stats">
              <div class="stat"><b>${escapeHtml(changes.para_actualizar ?? 0)}</b><span>Para actualizar</span></div>
              <div class="stat"><b>${escapeHtml(changes.productos_nuevos ?? 0)}</b><span>Productos nuevos</span></div>
              <div class="stat"><b>${escapeHtml(changes.sin_cambios ?? 0)}</b><span>Sin cambios</span></div>
              <div class="stat"><b>${escapeHtml(changes.errores_datos ?? 0)}</b><span>Errores de datos</span></div>
            </div>
          </article>

          <article class="card full">
            <div class="card-head"><h2>Accesos de diagnóstico</h2></div>
            <div class="actions">
              <a class="action primary" href="/api/scanntech-preview" target="_blank" rel="noopener">Ver comparación</a>
              <a class="action" href="/api/mock-scanntech" target="_blank" rel="noopener">Abrir simulador</a>
              <a class="action" href="/api/sync-status" target="_blank" rel="noopener">Ver JSON completo</a>
            </div>
          </article>
        </section>
      `;
    }

    async function load() {
      refreshButton.disabled = true;
      refreshButton.textContent = 'Actualizando…';
      try {
        const response = await fetch(`/api/sync-status?t=${Date.now()}`, { cache: 'no-store' });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || data.error || `Error ${response.status}`);
        render(data);
      } catch (error) {
        content.className = '';
        content.innerHTML = `<div class="error-box"><strong>No se pudo cargar el estado.</strong><br>${escapeHtml(error.message || error)}</div>`;
      } finally {
        refreshButton.disabled = false;
        refreshButton.textContent = 'Actualizar';
      }
    }

    refreshButton.addEventListener('click', load);
    load();
  </script>
</body>
</html>
